<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCheese's Sound Collection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: #3f51b5;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* Responsive Grid Layout */
        .soundboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, 120px);
            justify-content: center;
            gap: 20px;
            padding: 40px;
            width: 90%;
            max-width: 1000px;
        }

        /* Shared Button Styles */
        .sound-btn {
            width: 120px;
            height: 120px;
            background-color: #000; /* Fallback color */
            border: 2px solid #3f51b5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Universal background settings */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            overflow: hidden;
        }

        .sound-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            filter: brightness(1.2);
        }

        .sound-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>MrCheese's Sound Collection</header>

    <div class="soundboard-container">
        <!-- 
           CONFIGURABLE BUTTONS: 
           Simply change background-image: url('IMAGE_NAME.png') 
           and playSound('SOUND_NAME.wav') for each button.
        -->
        
        <!-- Button 1: Tobuscus Diamond Sword -->
        <button class="sound-btn" 
                style="background-image: url('diamond sword.png');" 
                onclick="playSound('YTDown.com_YouTube_I-CAN-SWING-MY-SWORD-Minecraft-Song_Media_eN7dYDYfvVg_001_1080p (2).wav')">
        </button>

        <!-- Button 2: Example with a Different Image/Sound -->
        <button class="sound-btn" 
                style="background-image: url('another_image.png');" 
                onclick="playSound('another_sound.wav')">
        </button>

    </div>

    <script>
        function playSound(file) {
            const audio = new Audio(file);
            audio.play().catch(error => {
                console.error("Audio error:", error);
            });
        }
    </script>

</body>
</html>
