<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCheese's Sound Collection</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styling */
        header {
            width: 100%;
            background-color: #3f51b5;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* Button Container */
        .soundboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 30px;
            max-width: 1000px;
        }

        /* Button Style with Diamond Sword Background */
        .sound-btn {
            width: 120px;
            height: 120px;
            background-color: white;
            border: 2px solid #3f51b5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

            /* Image Styling */
            background-image: url('diamond sword.png');
            background-size: contain;    /* Fits image inside button */
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Hover Effects */
        .sound-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            filter: brightness(1.1); /* Makes the sword image slightly brighter */
        }

        .sound-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        MrCheese's Sound Collection
    </header>

    <div class="soundboard-container">
        
        <!-- To add more sounds, copy and paste this button block -->
        <button class="sound-btn" onclick="playSound('YTDown.com_YouTube_I-CAN-SWING-MY-SWORD-Minecraft-Song_Media_eN7dYDYfvVg_001_1080p (2).wav')">
            <!-- No text needed if you just want the sword icon -->
        </button>

    </div>

    <script>
        // Function to play the audio
        function playSound(file) {
            const audio = new Audio(file);
            audio.play().catch(error => {
                console.error("Error playing sound. Make sure the file name is exact!", error);
            });
        }
    </script>

</body>
</html>
