<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrCheese's Sound Collection</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Styling */
        header {
            width: 100%;
            background-color: #3f51b5;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* GRID LAYOUT FIX */
        .soundboard-container {
            display: grid;
            /* Creates as many 120px columns as will fit, then centers them */
            grid-template-columns: repeat(auto-fit, 120px); 
            justify-content: center;
            gap: 20px;
            padding: 40px;
            width: 90%;
            max-width: 1000px;
        }

        /* FIXED Button Style */
        .sound-btn {
            width: 120px;
            height: 120px;
            background-color: #000; 
            border: 2px solid #3f51b5;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            /* Tobuscus Image Fixes */
            background-image: url('diamond sword.png');
            background-size: cover;    
            background-repeat: no-repeat;
            background-position: center;
            overflow: hidden;         
        }

        /* Hover Effects */
        .sound-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            filter: brightness(1.2);
        }

        .sound-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        MrCheese's Sound Collection
    </header>

    <div class="soundboard-container">
        
        <!-- Add more buttons here; the Grid will handle the alignment -->
        <button class="sound-btn" onclick="playSound('YTDown.com_YouTube_I-CAN-SWING-MY-SWORD-Minecraft-Song_Media_eN7dYDYfvVg_001_1080p (2).wav')"></button>
        <button class="sound-btn" onclick="playSound('another_sound.wav')"></button>
        <button class="sound-btn" onclick="playSound('another_sound.wav')"></button>

    </div>

    <script>
        function playSound(file) {
            const audio = new Audio(file);
            audio.play().catch(error => {
                console.error("Audio error:", error);
            });
        }
    </script>

</body>
</html>
